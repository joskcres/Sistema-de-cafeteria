<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pedidos - Cafetería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body class="w-100">

    <!-- Botón flotante para abrir carrito -->

    <div class="container-fluid">
        <div class="row">

            <!-- Columna izquierda: Catálogo -->
            <div class="col-lg-12 catalogo">
                <div class="encabezado">
                    <h2 class="titulo-cafe">☕ Cafetería Moderna</h2>
                    <button class="btn btn-carrito" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#carritoPanel">
                        🛒 Ver Pedido
                    </button>

                </div>
                <header class="mb-4">

                    <input type="text" class="form-control buscador" placeholder="Buscar producto...">
                    <div class="filtros mt-3">
                        <button class="btn btn-filter">Todas</button>
                        <button class="btn btn-filter">Bebidas calientes</button>
                        <button class="btn btn-filter">Bebidas frías</button>
                        <button class="btn btn-filter">Postres</button>
                        <button class="btn btn-filter">Comida</button>
                    </div>
                </header>

                <div class="row g-4 productos">
                    <!-- Ejemplo de producto -->
                    <!-- <div class="col-md-3">
                        <div class="card product-card">
                            <img src="https://via.placeholder.com/150" class="card-img-top" alt="Café Americano">
                            <div class="card-body">
                                <h5 class="card-title">Café Americano</h5>
                                <p class="card-text">Café negro tradicional</p>
                                <p class="precio">Q12.00</p>
                                <button class="btn btn-agregar">Agregar</button>
                            </div>
                        </div>
                    </div> -->
                    <!-- ... resto de productos ... -->
                </div>
            </div>

        </div>
    </div>

    <!-- Offcanvas Bootstrap: Carrito -->
    <div class="offcanvas offcanvas-end pedido-panel" tabindex="-1" id="carritoPanel">
        <div class="offcanvas-header">
            <h4 class="offcanvas-title">Tu Pedido</h4>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="pedido-container">
                <!-- Ejemplo de item en el pedido -->

            </div>

            <div class="total-container mt-4">
                <p>Subtotal: Q0.00</p>
                <p>Impuesto: Q0.00</p>
                <h5>Total: Q0.00</h5>
                <button class="btn btn-finalizar w-100" data-bs-toggle="modal" data-bs-target="#resumenFinal">
                    Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Resumen Final -->
    <div class="modal fade" id="resumenFinal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content resumen-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Pedido Finalizado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Productos:</p>
                    <ul>
                        <li>Café Latte x2 = Q36.00</li>
                        <li>Muffin x1 = Q15.00</li>
                    </ul>
                    <p><strong>Total pagado: Q51.00</strong></p>
                    <p>Gracias por tu compra.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (único script necesario) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>

</html>
